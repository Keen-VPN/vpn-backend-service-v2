version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-production}
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://keen_user:keen_password@postgres:5432/keen_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - postgres
      - redis
    restart: ${RESTART_POLICY:-unless-stopped}
    networks:
      - keen-network
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-keen_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-keen_password}
      - POSTGRES_DB=${POSTGRES_DB:-keen_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-keen_user} -d ${POSTGRES_DB:-keen_db}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keen-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - keen-network

volumes:
  postgres_data:
  redis_data:

networks:
  keen-network:
    driver: bridge

