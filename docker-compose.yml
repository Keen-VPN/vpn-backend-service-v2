services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=keen_user
      - POSTGRES_PASSWORD=keen_password
      - POSTGRES_DB=keen_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keen_user -d keen_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keen-network

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - keen-network

volumes:
  postgres_data:
  redis_data:

networks:
  keen-network:
    driver: bridge
